<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app-container">
        <header class="app-header">
            <h1 id="app-name">Calculator</h1>
        </header>

        <main class="calculator-wrapper">
            <div class="calculator">
                <div class="display-container">
                    <div class="mode-indicator" id="mode-indicator">DEG</div>
                    <div class="expression" id="expression-display"></div>
                    <div class="result" id="result-display">0</div>
                </div>

                <div class="keypad">
                    <!-- Scientific Row 1 -->
                    <button class="key scientific" data-action="clear">AC</button>
                    <button class="key scientific" data-action="delete">DEL</button>
                    <button class="key scientific" data-action="function" data-value="sin">sin</button>
                    <button class="key scientific" data-action="function" data-value="cos">cos</button>
                    <button class="key scientific" data-action="function" data-value="tan">tan</button>

                    <!-- Scientific Row 2 -->
                    <button class="key scientific" data-action="function" data-value="asin">sin⁻¹</button>
                    <button class="key scientific" data-action="function" data-value="acos">cos⁻¹</button>
                    <button class="key scientific" data-action="function" data-value="atan">tan⁻¹</button>
                    <button class="key scientific" data-action="function" data-value="log">log</button>
                    <button class="key scientific" data-action="function" data-value="ln">ln</button>

                    <!-- Scientific Row 3 -->
                    <button class="key scientific" data-action="function" data-value="sqrt">√</button>
                    <button class="key scientific" data-action="operator" data-value="^">xʸ</button>
                    <button class="key scientific" data-action="constant" data-value="pi">π</button>
                    <button class="key scientific" data-action="constant" data-value="e">e</button>
                    <button class="key scientific" data-action="function" data-value="fact">n!</button>

                    <!-- Basic Keys -->
                    <button class="key number">7</button>
                    <button class="key number">8</button>
                    <button class="key number">9</button>
                    <button class="key operator" data-value="/">÷</button>
                    <button class="key scientific" data-action="toggle-mode">DEG/RAD</button>

                    <button class="key number">4</button>
                    <button class="key number">5</button>
                    <button class="key number">6</button>
                    <button class="key operator" data-value="*">×</button>
                    <button class="key scientific" data-action="bracket" data-value="(">(</button>

                    <button class="key number">1</button>
                    <button class="key number">2</button>
                    <button class="key number">3</button>
                    <button class="key operator" data-value="-">-</button>
                    <button class="key scientific" data-action="bracket" data-value=")">)</button>

                    <button class="key number">0</button>
                    <button class="key number">.</button>
                    <button class="key action" data-action="calculate">=</button>
                    <button class="key operator" data-value="+">+</button>
                    <button class="key scientific" data-action="function" data-value="abs">abs</button>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
